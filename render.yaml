services:
  - type: web
    name: satyon-ai
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python -m gunicorn -w 4 -k uvicorn.workers.UvicornWorker --chdir backend main:app --bind 0.0.0.0:$PORT
    envVars:
      - key: DEBUG
        value: "false"
      - key: PYTHON_VERSION
        value: 3.11.0 # Render handles 3.11 well, 3.14 might be too new
      - key: MAX_RESULTS_PER_SOURCE
        value: "5"
      - key: OPENAI_API_KEY
        sync: false
      - key: SERPAPI_KEY
        sync: false
